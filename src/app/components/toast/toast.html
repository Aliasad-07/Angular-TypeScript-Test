<!-- Toast notification container - fixed position top-right -->
<div class="toast-container">
  @for (toast of notificationService.toasts(); track toast.id) {
    <div class="toast-item" [class]="'toast-' + toast.type" (click)="notificationService.dismiss(toast.id)">
      <div class="toast-icon">
        @switch (toast.type) {
          @case ('success') { <i class="bi bi-check-circle-fill"></i> }
          @case ('error') { <i class="bi bi-exclamation-circle-fill"></i> }
          @case ('info') { <i class="bi bi-info-circle-fill"></i> }
        }
      </div>
      <span class="toast-message">{{ toast.message }}</span>
      <button class="toast-close" (click)="notificationService.dismiss(toast.id)">
        <i class="bi bi-x"></i>
      </button>
    </div>
  }
</div>
